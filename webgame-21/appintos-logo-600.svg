<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="Zigzag Memory Run app logo">
  <defs>
    <linearGradient id="bg" x1="72" y1="20" x2="540" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#172d49"/>
      <stop offset="100%" stop-color="#0a1829"/>
    </linearGradient>
    <radialGradient id="glow-top" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(224 172) rotate(90) scale(238)">
      <stop offset="0%" stop-color="#22456b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22456b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 454) rotate(90) scale(218 248)">
      <stop offset="0%" stop-color="#0f3148" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#0f3148" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 300) rotate(90) scale(360)">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040b14" stop-opacity="0.42"/>
    </radialGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#2f4c67" stroke-width="3"/>
    </pattern>
    <filter id="path-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#06111c" flood-opacity="0.52"/>
    </filter>
    <filter id="mint-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#74f7d4" flood-opacity="0.36"/>
    </filter>
    <filter id="ring-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#74f7d4" flood-opacity="0.26"/>
    </filter>
    <filter id="node-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#05101a" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#glow-top)"/>
  <rect width="600" height="600" fill="url(#glow-bottom)"/>
  <rect width="600" height="600" fill="url(#grid)" opacity="0.3"/>
  <rect x="299" width="4" height="600" fill="#62d7c2" opacity="0.22"/>
  <rect x="298" width="8" height="600" fill="#62d7c2" opacity="0.06"/>

  <g opacity="0.18">
    <circle cx="112" cy="114" r="16" fill="#d6efff"/>
    <circle cx="156" cy="82" r="7" fill="#d6efff"/>
    <circle cx="480" cy="102" r="8" fill="#d6efff"/>
  </g>

  <path d="M132 315L302 468" stroke="#07121f" stroke-width="32" stroke-linecap="round" filter="url(#path-shadow)" opacity="0.48"/>

  <g filter="url(#mint-glow)">
    <path d="M132 315L302 468" stroke="#74f7d4" stroke-width="22" stroke-linecap="round"/>
    <path d="M132 315L302 468" stroke="#9cfbe6" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g filter="url(#ring-glow)">
    <circle cx="205" cy="221" r="35" fill="none" stroke="#58d7c4" stroke-width="10" opacity="0.92"/>
    <circle cx="205" cy="221" r="49" fill="none" stroke="#58d7c4" stroke-width="3" opacity="0.12"/>
  </g>

  <g filter="url(#node-shadow)">
    <circle cx="132" cy="315" r="20" fill="#ffd479"/>
    <circle cx="302" cy="468" r="22" fill="#ffd479"/>
  </g>

  <circle cx="132" cy="315" r="9" fill="#ffe7aa" opacity="0.72"/>
  <circle cx="302" cy="468" r="10" fill="#ffe7aa" opacity="0.72"/>

  <path d="M132 315L302 468" stroke="#d6fff4" stroke-width="3" stroke-linecap="round" opacity="0.24"/>
  <rect width="600" height="600" fill="url(#vignette)"/>
</svg>
