<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sunken Sixway Defense</title>
  <link rel="stylesheet" href="style.css?v=20260303b" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="top-row">
        <div class="mode-tabs">
          <a class="mode-tab active" href="./index.html">Single</a>
          <a class="mode-tab" href="./multi.html">Multi</a>
        </div>
        <section class="single-rank" id="singleRankPanel" aria-label="Single leaderboard">
          <div class="rank-head">
            <strong>Single Leaderboard</strong>
            <span id="rankScope">LOCAL</span>
          </div>
          <div class="rank-controls rank-controls-main">
            <input id="rankName" type="text" maxlength="14" placeholder="Name" />
            <button id="rankSave" type="button">Save</button>
            <button id="rankRefresh" type="button">Refresh</button>
          </div>
          <ol class="rank-list" id="rankList"></ol>
          <div class="rank-status" id="rankStatus">Loading local leaderboard...</div>
        </section>
      </div>
      <h1>Sunken Sixway Defense</h1>
    </header>

    <div class="hud" id="hud">
      <div class="stat">Stage <b id="stageText">1</b>/50</div>
      <div class="stat">Kills <b id="killsText">0</b></div>
      <div class="stat">Time <b id="timeText">0:00</b></div>
      <div class="stat stat-gold">Gold <b id="goldText">0</b></div>
      <div class="stat">Speed <b id="speedText">1.00x</b></div>
      <div class="stat">Base <b id="baseText">20</b></div>
      <div class="stat">Alive <b id="aliveText">0</b></div>
      <div class="stat">Queue <b id="queueText">0</b></div>
    </div>

    <div class="quick-build" id="quickBuild">
      <button class="build-btn" data-kind="sunken" id="btnSunken" type="button">
        <span class="icon">S</span>
        <span class="name">Sunken</span>
        <span class="cost">40</span>
      </button>
      <!-- Slow Sunken removed -->
      <!-- Long Sunken removed -->
      <button class="build-btn" data-kind="sunkenSplash" id="btnSunkenSplash" type="button">
        <span class="icon">X</span>
        <span class="name">Splash Sunken</span>
        <span class="cost">130</span>
      </button>
      <button class="build-btn" data-kind="sunkenHammer" id="btnSunkenHammer" type="button">
        <span class="icon">H</span>
        <span class="name">Hammer Sunken</span>
        <span class="cost">120</span>
      </button>
      <button class="build-btn" data-kind="sunkenNova" id="btnSunkenNova" type="button">
        <span class="icon">V</span>
        <span class="name">Nova Sunken</span>
        <span class="cost">145</span>
      </button>
      <button class="build-btn" data-kind="sunkenStun" id="btnSunkenStun" type="button">
        <span class="icon">T</span>
        <span class="name">Stun Sunken</span>
        <span class="cost">165</span>
      </button>
      <button class="build-btn" data-kind="speedSunken" id="btnSpeedSunken" type="button">
        <span class="icon">P</span>
        <span class="name">Speed Sunken</span>
        <span class="cost">70</span>
      </button>
      <button class="build-btn" data-kind="tankerSunken" id="btnTankerSunken" type="button">
        <span class="icon">K</span>
        <span class="name">Tanker Sunken</span>
        <span class="cost">95</span>
      </button>
      <!-- Obelisk removed -->
      <!-- Snare removed -->
      <button class="build-btn mode-btn" id="btnSellMode" data-action="toggle-sell" type="button">
        <span class="icon">E</span>
        <span class="name">SELL OFF</span>
        <span class="cost">Sell mode</span>
      </button>
      <button class="build-btn mode-btn" id="btnSpeedUp" data-action="speed-up" type="button">
        <span class="icon">+</span>
        <span class="name">Speed +</span>
        <span class="cost">+0.25x</span>
      </button>
      <button class="build-btn mode-btn" id="btnSpeedDown" data-action="speed-down" type="button">
        <span class="icon">-</span>
        <span class="name">Speed -</span>
        <span class="cost">-0.25x</span>
      </button>
      <button class="build-btn mode-btn pause-btn" id="btnPause" data-action="toggle-pause" type="button">
        <span class="icon">⏸</span>
        <span class="name">Pause</span>
        <span class="cost">Pause</span>
      </button>
      <button class="build-btn mode-btn" id="btnMerge" data-action="toggle-merge" type="button">
        <span class="icon">⛓</span>
        <span class="name">Merge</span>
        <span class="cost">Merge 0/5</span>
      </button>
      <button class="build-btn mode-btn" id="btnChoLotto" data-action="cho-lotto" type="button">
        <span class="icon">🎲</span>
        <span class="name">Lotto Sunken</span>
        <span class="cost">1000 Gold</span>
      </button>
      <button class="build-btn mode-btn" id="btnCull" data-action="cull-enemies" type="button">
        <span class="icon">☠</span>
        <span class="name">-50% ALL ENEMY HP</span>
        <span class="cost">10000 Gold</span>
      </button>
      <button class="build-btn mode-btn ult-btn" id="btnEmperorShield" data-action="emperor-shield" type="button">
        <span class="icon">R</span>
        <span class="name">EMPEROR SHIELD</span>
        <span class="cost">1000 Gold / 10s</span>
      </button>
    </div>

    <div class="controls" id="controls">
      <div class="tower-guide" id="towerGuide"></div>
    </div>

    <div class="arena">
      <canvas id="game" width="960" height="540"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>

    <footer></footer>
  </div>

  <script src="../assets/js/neon-audio.js"></script>
  <script>
    window.TapTapChoConfig = Object.assign({}, window.TapTapChoConfig, {
      // Fixed Cloudflare leaderboard server (example: wss://sunken-rank.example.com)
      // If empty, connect to ws(s)://<host>:9091 on the current host.
      singleRankServer: 'wss://desert-television-nationally-communicate.trycloudflare.com',
    });
  </script>
  <script src="game.js?v=20260303c"></script>
</body>
</html>
