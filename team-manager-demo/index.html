<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>팀원관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>팀원관리</h1>
      <p>트렐로 스타일 업무 보드 (UI 목업)</p>
    </header>

    <div class="toolbar">
      <button class="btn">+ 새 카드</button>
      <button class="btn ghost">필터</button>
      <button class="btn ghost">정렬</button>
      <div class="spacer"></div>
      <button class="btn ghost">설정</button>
    </div>

    <div class="board">
      <section class="column">
        <div class="col-head">
          <span>할 일</span>
          <span class="count">6</span>
        </div>
        <div class="card">
          <div class="title">신규 기능 스펙 정리</div>
          <div class="meta">담당: 민지 · 우선순위: 높음</div>
          <div class="tags">
            <span class="tag">기획</span>
            <span class="tag">문서</span>
          </div>
        </div>
        <div class="card">
          <div class="title">모바일 UI 가이드 정리</div>
          <div class="meta">담당: 현우</div>
          <div class="tags"><span class="tag">디자인</span></div>
        </div>
        <div class="card">
          <div class="title">배포 체크리스트 정리</div>
          <div class="meta">담당: 나영</div>
          <div class="tags"><span class="tag">운영</span></div>
        </div>
      </section>

      <section class="column">
        <div class="col-head">
          <span>진행 중</span>
          <span class="count">4</span>
        </div>
        <div class="card">
          <div class="title">Orbit Survivor 개선</div>
          <div class="meta">담당: 준호 · D-2</div>
          <div class="tags">
            <span class="tag">개발</span>
            <span class="tag">밸런스</span>
          </div>
        </div>
        <div class="card">
          <div class="title">QA 테스트 케이스 작성</div>
          <div class="meta">담당: 수아</div>
          <div class="tags"><span class="tag">QA</span></div>
        </div>
      </section>

      <section class="column">
        <div class="col-head">
          <span>리뷰</span>
          <span class="count">2</span>
        </div>
        <div class="card">
          <div class="title">팀원관리 UI 초안</div>
          <div class="meta">담당: 민지</div>
          <div class="tags"><span class="tag">디자인</span></div>
        </div>
        <div class="card">
          <div class="title">배너 문구 리뷰</div>
          <div class="meta">담당: 현우</div>
          <div class="tags"><span class="tag">마케팅</span></div>
        </div>
      </section>

      <section class="column">
        <div class="col-head">
          <span>완료</span>
          <span class="count">5</span>
        </div>
        <div class="card done">
          <div class="title">스프린트 일정 공유</div>
          <div class="meta">담당: 리드</div>
          <div class="tags"><span class="tag">관리</span></div>
        </div>
        <div class="card done">
          <div class="title">초기 카드 템플릿 제작</div>
          <div class="meta">담당: 나영</div>
          <div class="tags"><span class="tag">문서</span></div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
