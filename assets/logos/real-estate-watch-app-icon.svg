<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Real Estate Watch app icon</title>
  <desc id="desc">A warm-toned app icon combining a property skyline and an upward real estate trend line.</desc>
  <defs>
