      <stop offset="54%" stop-color="#f7f1e8" />
      <stop offset="100%" stop-color="#f1debe" />
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 118) rotate(26) scale(250 250)">
      <stop offset="0%" stop-color="#0f6c6d" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#0f6c6d" stop-opacity="0" />
