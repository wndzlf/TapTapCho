    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 126) rotate(90) scale(220 220)">
      <stop offset="0%" stop-color="#d69a5f" stop-opacity="0.34" />
