<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#301c49" />
  <title>냥젤리 카페</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar" aria-label="게임 상단 정보">
      <div class="brand">
        <span id="bridgeBadge" class="badge badge-preview">웹 미리보기</span>
        <h1>냥젤리 카페</h1>
        <p id="statusLine" class="status-line" aria-live="polite">요청 젤리와 같은 고양이를 바로 탭해서 서빙하세요.</p>
        <p id="userKeyHint" class="status-hint" aria-live="polite">토스 게임 계정 연결 상태를 확인 중입니다.</p>
      </div>
      <button id="btnExit" class="btn-exit" type="button">종료</button>
    </header>

    <section class="hud" aria-label="점수 정보">
      <div class="hud-item">
        <span>점수</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-item">
        <span>최고</span>
        <strong id="best">0</strong>
      </div>
      <div class="hud-item">
        <span>남은 시간</span>
        <strong id="timeLeft">60</strong>
      </div>
    </section>

    <section id="stage" class="stage" aria-label="게임 화면">
      <canvas id="game" width="420" height="760" aria-label="냥젤리 카페 게임 보드"></canvas>
    </section>

    <p class="mini-guide">시작 후에는 화면 안의 고양이를 탭하는 것만으로 플레이됩니다.</p>

    <div class="legal-links">
      <a href="../privacy.html">개인정보처리방침</a>
      <a href="../terms.html">이용약관</a>
      <a href="../contact.html">문의하기</a>
    </div>
  </main>

  <div
    id="exitModal"
    class="sheet-modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="exitTitle"
  >
    <div class="sheet-card">
      <p class="kicker">종료 확인</p>
      <h2 id="exitTitle">냥젤리 카페를 종료할까요?</h2>
      <p class="copy">현재 라운드는 종료되지만 최고 점수는 저장됩니다.</p>
      <div class="actions">
        <button id="btnCancelExit" class="btn btn-secondary" type="button">계속 플레이</button>
        <button id="btnConfirmExit" class="btn btn-danger" type="button">종료</button>
      </div>
    </div>
  </div>

  <script src="toss-bridge.js"></script>
  <script src="game.js"></script>
</body>
</html>
