<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#10161f" />
  <title>선큰 식스웨이 디펜스 2</title>
  <link rel="stylesheet" href="style.css?v=20260322a" />
</head>
<body>
  <div class="app" id="app">
    <header class="hud-top">
      <div class="chips">
        <div class="chip"><span>STAGE</span><b id="stageText">1</b></div>
        <div class="chip"><span>HP</span><b id="hpText">24/24</b></div>
        <div class="chip chip-gold"><span>GOLD</span><b id="goldText">0</b></div>
        <div class="chip"><span>KILL</span><b id="killText">0</b></div>
      </div>
      <div class="hud-actions">
        <button id="btnMusic" class="mini-btn" type="button" aria-pressed="true">BGM</button>
        <button id="btnSfx" class="mini-btn" type="button" aria-pressed="true">FX</button>
        <button id="btnExit" class="mini-btn mini-btn-danger" type="button" aria-label="종료">✕</button>
      </div>
    </header>

    <div class="phase-strip">
      <div class="phase-pill" id="phasePill">배치 턴</div>
      <div class="phase-timer" id="phaseTimer">08.0</div>
    </div>

    <main class="arena-shell">
      <canvas id="game" width="720" height="1280" aria-label="선큰 식스웨이 디펜스 2 게임 화면"></canvas>
      <div class="overlay" id="overlay"></div>
    </main>

    <section class="build-strip" id="buildStrip" aria-label="타워 배치 패널">
      <button class="build-btn active" data-kind="sunken" type="button">
        <span class="name">기본</span>
        <span class="cost" data-cost-for="sunken">45</span>
      </button>
      <button class="build-btn" data-kind="speedSunken" type="button">
        <span class="name">속사</span>
        <span class="cost" data-cost-for="speedSunken">75</span>
      </button>
      <button class="build-btn" data-kind="tankerSunken" type="button">
        <span class="name">탱커</span>
        <span class="cost" data-cost-for="tankerSunken">95</span>
      </button>
      <button class="build-btn" data-kind="sunkenSplash" type="button">
        <span class="name">광역</span>
        <span class="cost" data-cost-for="sunkenSplash">130</span>
      </button>
      <button class="build-btn" data-kind="sunkenHammer" type="button">
        <span class="name">해머</span>
        <span class="cost" data-cost-for="sunkenHammer">120</span>
      </button>
      <button class="build-btn mode-btn" id="btnSellMode" type="button">
        <span class="name">판매</span>
        <span class="cost">OFF</span>
      </button>
    </section>

    <p class="hint" id="hintText">타워 선택 후 길목 옆 칸을 터치해 배치하세요</p>
  </div>

  <div id="exitModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="exitTitle">
    <div class="modal-card">
      <h2 id="exitTitle">게임을 종료할까요?</h2>
      <p>진행 중 스테이지는 저장되지 않습니다.</p>
      <div class="modal-actions">
        <button id="btnCancelExit" class="modal-btn" type="button">계속</button>
        <button id="btnConfirmExit" class="modal-btn modal-btn-danger" type="button">종료</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/neon-audio.js"></script>
  <script src="toss-bridge.js"></script>
  <script src="game.js?v=20260322a"></script>
</body>
</html>
