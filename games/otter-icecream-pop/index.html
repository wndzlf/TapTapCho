<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#6ecdf4" />
  <title>수달아이스팝</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar" aria-label="게임 상단 정보">
      <div class="brand">
        <span id="bridgeBadge" class="badge badge-preview">웹 미리보기</span>
        <h1>수달아이스팝</h1>
        <p id="statusLine" class="status-line" aria-live="polite">달콤한 아이스팝이 수달 입가에 닿는 순간 탭하세요.</p>
        <p id="userKeyHint" class="status-hint" aria-live="polite">토스 계정 연결 상태를 확인하는 중입니다.</p>
      </div>
      <button id="btnExit" class="btn-exit" type="button">종료</button>
    </header>

    <section class="hud" aria-label="점수 정보">
      <div class="hud-item">
        <span>점수</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-item">
        <span>최고</span>
        <strong id="best">0</strong>
      </div>
      <div class="hud-item">
        <span>콤보</span>
        <strong id="combo">0</strong>
      </div>
      <div class="hud-item">
        <span>남은 시간</span>
        <strong id="timeLeft">45</strong>
      </div>
    </section>

    <section id="stage" class="stage" aria-label="게임 화면">
      <canvas id="game" width="480" height="800" aria-label="수달아이스팝 게임 보드"></canvas>
    </section>

    <p class="mini-guide">화면 어디를 탭해도 됩니다. 타이밍만 맞추면 바로 먹습니다.</p>
  </main>

  <div
    id="exitModal"
    class="sheet-modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="exitTitle"
  >
    <div class="sheet-card">
      <p class="kicker">종료 확인</p>
      <h2 id="exitTitle">수달아이스팝을 종료할까요?</h2>
      <p class="copy">현재 점수는 저장됩니다. 토스 환경이면 닫기 동작을 호출합니다.</p>
      <div class="actions">
        <button id="btnCancelExit" class="btn btn-secondary" type="button">계속 플레이</button>
        <button id="btnConfirmExit" class="btn btn-danger" type="button">종료</button>
      </div>
    </div>
  </div>

  <script src="toss-bridge.js"></script>
  <script src="game.js"></script>
</body>
</html>
