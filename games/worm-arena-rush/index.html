<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>웜 아레나 러시</title>
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../assets/css/site-quality.css" />
</head>
<body
  data-site-guide-mode="floating"
  data-site-guide-lang="ko"
  data-site-guide-label="게임 가이드"
  data-site-guide-close-label="닫기"
>
  <div class="wrap">
    <header>
      <h1>웜 아레나 러시</h1>
      <p>좁아지는 안전 구역 안에서 끝까지 버티며 최고 점수를 노리세요.</p>
    </header>

    <div class="hud">
      <div>점수: <span id="score">0</span></div>
      <div>최고점: <span id="best">0</span></div>
      <div>남은 시간: <span id="time">90.0초</span></div>
      <div>안전 구역: <span id="zone">100%</span></div>
      <div>길이: <span id="length">0</span></div>
      <button id="btnStart" type="button">시작</button>
    </div>

    <button id="btnFullscreen" class="fullscreen-fab" type="button" aria-label="전체화면 전환" aria-pressed="false">
      <span>전체</span>
    </button>

    <div class="arena">
      <canvas id="game" width="420" height="700"></canvas>
      <div class="turn-pad-wrap">
        <div class="turn-pad" id="turnPad" aria-label="조향 패드" role="application">
          <div class="turn-pad-knob" id="turnKnob" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <footer>
      <small>조작: 터치/마우스 또는 WASD/방향키 · 모바일은 우하단 조향 패드 사용</small>
      <br />
      <small>배경음악: Coffee - Morning Coffee Shop Music / HitsLab / Pixabay Content License</small>
    </footer>
  </div>

  <script src="../assets/js/neon-audio.js"></script>
  <script src="game.js"></script>
  <script src="../assets/js/site-quality.js"></script>
</body>
</html>
