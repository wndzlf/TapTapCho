<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f4d8c2" />
  <title>토끼푸딩 바</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero" aria-label="게임 상단 정보">
      <div class="hero-copy">
        <p class="eyebrow">ONE TAP / PORTRAIT</p>
        <h1>토끼푸딩 바</h1>
        <p id="statusLine" class="status-line" aria-live="polite">화면을 탭하면 바로 시작됩니다.</p>
        <p id="userKeyHint" class="status-hint" aria-live="polite">토스 연결 정보를 확인 중입니다.</p>
      </div>
      <button id="btnExit" class="btn btn-exit" type="button">종료</button>
    </header>

    <section class="hud" aria-label="점수 정보">
      <div class="hud-item">
        <span>점수</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-item">
        <span>최고</span>
        <strong id="best">0</strong>
      </div>
      <div class="hud-item">
        <span>남은 시간</span>
        <strong id="timeLeft">45</strong>
      </div>
    </section>

    <section id="stage" class="stage" aria-label="게임 화면">
      <canvas id="game" width="420" height="760" aria-label="토끼푸딩 바 게임 보드"></canvas>
    </section>

    <p class="mini-guide">버튼은 종료만 있습니다. 나머지는 탭 한 번으로 끝냅니다.</p>
  </main>

  <div id="exitModal" class="sheet-modal hidden" role="dialog" aria-modal="true" aria-labelledby="exitTitle">
    <div class="sheet-card">
      <p class="kicker">종료 확인</p>
      <h2 id="exitTitle">토끼푸딩 바를 종료할까요?</h2>
      <p class="copy">현재 기록은 저장됩니다. 계속하려면 바깥을 탭하세요.</p>
      <div class="actions">
        <button id="btnCancelExit" class="btn btn-secondary" type="button">계속 플레이</button>
        <button id="btnConfirmExit" class="btn btn-danger" type="button">종료</button>
      </div>
    </div>
  </div>

  <script src="toss-bridge.js"></script>
  <script src="game.js"></script>
</body>
</html>
