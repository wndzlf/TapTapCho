<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Survivor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Orbit Survivor</h1>
      <p>Tap to switch orbit direction and dodge incoming shards.</p>
    </header>

    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Lives: <span id="lives">3</span></div>
      <div>Best: <span id="best">0</span></div>
      <div>Streak: <span id="streak">0</span></div>
      <button id="btnStart">Start</button>
    </div>

    <div class="game-shell">
      <canvas id="game" width="420" height="700"></canvas>
      <div id="hitFlash" class="hit-flash"></div>
      <div id="gameOverModal" class="gameover-modal hidden" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <div class="gameover-card">
          <h2 id="gameOverTitle">Mission Failed</h2>
          <p>Final Score: <strong id="finalScore">0</strong></p>
          <p>Best Score: <strong id="finalBest">0</strong></p>
          <button id="btnRestart">Play Again</button>
        </div>
      </div>
    </div>

    <footer>
      <small>Tap / Space: change orbit direction · Music: "Comedy Cartoon Funny Background Music" (Pixabay)</small>
    </footer>
  </div>

  <script src="../assets/js/neon-audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
