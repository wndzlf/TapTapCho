name: Commercial Area Radar Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: commercial-area-radar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync commercial area snapshot
        env:
          REAL_ESTATE_API_SERVICE_KEY: ${{ secrets.REAL_ESTATE_API_SERVICE_KEY }}
        run: npm run sync-commercial-area-radar

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games/commercial-area-radar/latest-commercial-area-snapshot.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh commercial area radar snapshot"
          git push origin HEAD:${GITHUB_REF_NAME}
